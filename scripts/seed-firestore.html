<!-- scripts/seed-firestore.html -->
<!-- Firestore'a görsel havuzunu yükleyen araç -->
<!-- Temizle + Yükle işlemini tek butonla yapar -->
<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Firestore Seed</title>
    <style>
        body {
            font-family: system-ui;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            color: white;
        }

        .btn-seed {
            background: #2563eb;
        }

        .btn-reset {
            background: #dc2626;
        }

        .btn-seed:hover {
            background: #1d4ed8;
        }

        .btn-reset:hover {
            background: #b91c1c;
        }

        pre {
            background: #f3f4f6;
            padding: 16px;
            border-radius: 8px;
            max-height: 500px;
            overflow-y: auto;
        }

        .warning {
            background: #fef3c7;
            border: 1px solid #f59e0b;
            padding: 12px;
            border-radius: 8px;
            margin: 16px 0;
        }
    </style>
</head>

<body>
    <h2>Firestore Görsel Havuzu Yönetimi</h2>

    <div class="warning">
        ⚠️ "Temizle ve Yeniden Yükle" butonu tüm mevcut verileri (termogramlar + çizimler) silip
        sıfırdan yükler. Test verileriniz kaybolur.
    </div>

    <button class="btn-seed" onclick="seedOnly()">📥 Sadece Yükle (mevcut verilere ekle)</button>
    <button class="btn-reset" onclick="cleanAndSeed()">🔄 Temizle ve Yeniden Yükle</button>

    <pre id="log">Bekleniyor...</pre>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getFirestore, doc, setDoc, collection, getDocs, deleteDoc }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        import { getAuth, signInAnonymously }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        const app = initializeApp({
            apiKey: "AIzaSyAiIza_wzTlnL6mrtu6pBJwDVQBOjfLlr8",
            authDomain: "termogram-digitizer.firebaseapp.com",
            projectId: "termogram-digitizer",
            storageBucket: "termogram-digitizer.firebasestorage.app",
            messagingSenderId: "818774713299",
            appId: "1:818774713299:web:1dbe686cde9147adc94526"
        });
        const db = getFirestore(app);
        const auth = getAuth(app);

        await signInAnonymously(auth);
        document.getElementById('log').textContent = 'Firebase bağlantısı hazır. Bir buton seçin.\n';

        // ── Termogramlar + Diğer Veri Tipleri ──
        const TERMOGRAMS = [
            // Demo set: 1 record per data type
            {
                id: "1997_AGUSTOS-21",
                imageFile: "images/termogram/1997_AGUSTOS-21.png",
                label: "1997 Ağustos 21",
                dataType: "termogram",
                startDate: "1997-08-21T00:00:00", endDate: "1997-08-28T00:00:00",
                tempMin: -10, tempMax: 40,
                gridLeft: 120, gridRight: 3500, gridTop: 50, gridBottom: 1000,
                traceCount: 0, maxTraces: 5, status: "available"
            },
            {
                id: "BARO_2003_EKIM-08",
                imageFile: "images/barograf/2003_EKIM-08.png",
                label: "Barograf 2003 Ekim 08",
                dataType: "barograf",
                startDate: "2003-10-08T00:00:00", endDate: "2003-10-15T00:00:00",
                tempMin: 950, tempMax: 1050,
                gridLeft: 120, gridRight: 3500, gridTop: 50, gridBottom: 1000,
                traceCount: 0, maxTraces: 5, status: "available"
            },
            {
                id: "AKTINO_1981_EKIM-25",
                imageFile: "images/aktinograf/1981_EKIM-25.png",
                label: "Aktinograf 1981 Ekim 25",
                dataType: "aktinograf",
                startDate: "1981-10-25T00:00:00", endDate: "1981-11-01T00:00:00",
                tempMin: 0, tempMax: 1200,
                gridLeft: 120, gridRight: 3500, gridTop: 50, gridBottom: 1000,
                traceCount: 0, maxTraces: 5, status: "available"
            },
            {
                id: "NEM_2020_MAYIS-10",
                imageFile: "images/nem/2020_MAYIS-10.png",
                label: "Nem 2020 Mayıs 10",
                dataType: "nem",
                startDate: "2020-05-10T00:00:00", endDate: "2020-05-17T00:00:00",
                tempMin: 0, tempMax: 100,
                gridLeft: 120, gridRight: 3500, gridTop: 50, gridBottom: 1000,
                traceCount: 0, maxTraces: 5, status: "available"
            }
        ];
        async function deleteCollection(collectionName) {
            const log = document.getElementById('log');
            const snapshot = await getDocs(collection(db, collectionName));
            if (snapshot.empty) { log.textContent += `  ${collectionName}: zaten boş\n`; return 0; }
            let count = 0;
            for (const docSnap of snapshot.docs) {
                await deleteDoc(doc(db, collectionName, docSnap.id));
                count++;
            }
            log.textContent += `  ${collectionName}: ${count} belge silindi\n`;
            return count;
        }

        async function uploadTermograms() {
            const log = document.getElementById('log');
            for (const t of TERMOGRAMS) {
                await setDoc(doc(db, "termograms", t.id), t);
                log.textContent += `  ✓ ${t.id} yüklendi\n`;
            }
            log.textContent += `\n✅ Tamamlandı! ${TERMOGRAMS.length} termogram yüklendi.\n`;
        }

        window.seedOnly = async function () {
            const log = document.getElementById('log');
            log.textContent = '📥 Termogramlar yükleniyor...\n\n';
            try { await uploadTermograms(); }
            catch (err) { log.textContent += `\n❌ Hata: ${err.message}\n`; }
        };

        window.cleanAndSeed = async function () {
            if (!confirm('Tüm veriler (termogramlar + çizimler) silinecek. Emin misiniz?')) return;
            const log = document.getElementById('log');
            log.textContent = '🗑️ Mevcut veriler temizleniyor...\n\n';
            try {
                await deleteCollection('traces');
                await deleteCollection('termograms');
                log.textContent += '\n📥 Termogramlar yeniden yükleniyor...\n\n';
                await uploadTermograms();
            } catch (err) {
                log.textContent += `\n❌ Hata: ${err.message}\n`;
                log.textContent += `\nİpucu: Firestore güvenlik kurallarınızın delete işlemine izin verdiğinden emin olun.\n`;
            }
        };
    </script>
</body>

</html>

<body>
    <div class="top-bar">
        <h1>📊 Admin Panel — Çapraz Doğrulama Analizi</h1>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('analysis')">🔬 Termogram Analizi</div>
        <div class="tab" onclick="switchTab('leaderboard')">🏆 Genel Sıralama</div>
    </div>

    <!-- TAB 1 -->
    <div id="analysisTab" class="analysis-section active">
        <div class="controls">
            <select id="dataTypeFilterAdmin" onchange="filterTermogramSelect()" style="padding:6px 10px;border-radius:6px;background:#1e293b;color:#e2e8f0;border:1px solid #334155;font-size:0.82rem;">
                <option value="">Tümü</option>
                <option value="termogram">🌡️ Termogram</option>
                <option value="barograf">📊 Barograf</option>
                <option value="termohigrograf">💧 Termohigrograf</option>
                <option value="aktinograf">☀️ Aktinograf</option>
            </select>
            <select id="termogramSelect" onchange="onTermogramSelect()">
                <option value="">Kayıt seçin...</option>
            </select>
            <span id="statusBadge"></span>
            <span id="traceCountText" style="font-size:0.8rem; color:#94a3b8;"></span>
        </div>
        <div class="main-grid">
            <div class="canvas-section">
                <div id="emptyState" class="empty-state">
                    <div class="icon">🌡️</div>
                    <p>Bir termogram seçerek analizi görüntüleyin</p>
                </div>
                <canvas id="analysisCanvas" style="display:none;"></canvas>
                <div class="canvas-tooltip" id="canvasTooltip"></div>
                <div id="legendContainer" class="legend" style="display:none;"></div>
            </div>
            <div class="side-panel">
                <div id="analysisPanel">
                    <div class="empty-state" style="height:auto; padding:60px 20px;">
                        <div class="icon">📈</div>
                        <p>Analiz sonuçları burada görünecek</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB 2 -->
    <div id="leaderboardTab" class="leaderboard-section">
        <div id="leaderboardContent">
            <div class="empty-state" style="padding:60px;">
                <div class="icon">⏳</div>
                <p>Yükleniyor...</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('analysisCanvas');
        const ctx = canvas.getContext('2d');
        let allTermograms = [], allTraces = [];
        const TRACE_COLORS = ['#f97316', '#22d3ee', '#a78bfa'];
        const AVERAGE_COLOR = '#22c55e';

        // ── Analiz sırasında kullanılan global veriler (tooltip için) ──
        let currentAnalysisImage = null;   // Canvas'taki termogram görseli
        let currentAveragePoints = [];     // Ortalama eğri noktaları
        let currentTraceData = [];         // Trace verileri
        let currentScores = [];            // Puanlar
        let currentRefCalibration = null;  // Referans noktalarından hesaplanan kalibrasyon
        let currentTermogramData = null;   // Aktif termogram Firestore verisi

        // ═══════════════════════════════════════
        // TOOLTIP — Mouse ile sıcaklık gösterimi
        // ═══════════════════════════════════════

        const tooltip = document.getElementById('canvasTooltip');

        canvas.addEventListener('mousemove', (e) => {
            if (!currentAnalysisImage || currentAveragePoints.length === 0) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const px = Math.round((e.clientX - rect.left) * scaleX);
            const py = Math.round((e.clientY - rect.top) * scaleY);

            // Ortalama eğrideki en yakın y değerini bul
            const avgY = interpolateY(currentAveragePoints, px);
            if (avgY === null) { tooltip.style.display = 'none'; return; }

            // Sıcaklık hesapla
            let tempText = '';
            if (currentRefCalibration) {
                // Referans noktalarından hesaplanan kalibrasyon ile
                const temp = pixelYToTemp(avgY, currentRefCalibration);
                tempText = `<div class="temp-value">${temp.toFixed(1)}°C</div>`;
            } else if (currentTermogramData) {
                // Fallback: Firestore'daki grid kalibrasyonu ile
                const cal = currentTermogramData;
                const ratio = (avgY - cal.gridTop) / (cal.gridBottom - cal.gridTop);
                const temp = cal.tempMax - ratio * (cal.tempMax - cal.tempMin);
                tempText = `<div class="temp-value">${temp.toFixed(1)}°C</div>`;
            }

            // Dikey çizgi çiz (crosshair)
            redrawAnalysis();
            ctx.beginPath();
            ctx.moveTo(px, 0);
            ctx.lineTo(px, canvas.height);
            ctx.strokeStyle = 'rgba(251,191,36,0.4)';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Ortalama eğri üzerindeki noktayı işaretle
            ctx.beginPath();
            ctx.arc(px, avgY, 5, 0, Math.PI * 2);
            ctx.fillStyle = '#fbbf24';
            ctx.fill();

            // Tooltip pozisyonu
            tooltip.innerHTML = tempText + `<div class="pixel-info">x:${px} y:${Math.round(avgY)}</div>`;
            tooltip.style.display = 'block';

            // Tooltip'i mouse'un yanında göster ama canvas dışına taşmasın
            const tooltipX = e.clientX - rect.left + 20;
            const tooltipY = e.clientY - rect.top - 10;
            tooltip.style.left = tooltipX + 'px';
            tooltip.style.top = tooltipY + 'px';
        });

        canvas.addEventListener('mouseleave', () => {
            tooltip.style.display = 'none';
            if (currentAnalysisImage) redrawAnalysis();
        });

        // ── Canvas'ı mevcut verilerle yeniden çiz (tooltip crosshair temizlemek için) ──
        function redrawAnalysis() {
            if (!currentAnalysisImage) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentAnalysisImage, 0, 0);

            // Trace'leri yeniden çiz
            currentTraceData.forEach((trace, i) => {
                drawCurve(trace.rawPoints, TRACE_COLORS[i % TRACE_COLORS.length], 2);
            });

            // Ortalama eğriyi çiz
            if (currentAveragePoints.length > 0) {
                drawCurve(currentAveragePoints, AVERAGE_COLOR, 3);
            }

            // Referans noktalarını çiz
            drawAllRefPoints();
        }

        // ═══════════════════════════════════════
        // REFERANS NOKTALARINDAN KALİBRASYON
        // ═══════════════════════════════════════

        // Tüm trace'lerdeki referans noktalarını topla ve lineer regresyon yap
        // y_piksel → sıcaklık dönüşümü için: temp = a * y_piksel + b
        function buildRefCalibration(traces) {
            const allRefPoints = [];
            for (const trace of traces) {
                if (trace.referencePoints && trace.referencePoints.length > 0) {
                    for (const rp of trace.referencePoints) {
                        allRefPoints.push({ y: rp.y, temp: rp.temperature });
                    }
                }
            }

            if (allRefPoints.length < 2) return null;

            // Basit lineer regresyon: temp = a * y + b
            const n = allRefPoints.length;
            let sumY = 0, sumT = 0, sumYT = 0, sumYY = 0;
            for (const p of allRefPoints) {
                sumY += p.y;
                sumT += p.temp;
                sumYT += p.y * p.temp;
                sumYY += p.y * p.y;
            }
            const denom = n * sumYY - sumY * sumY;
            if (Math.abs(denom) < 0.001) return null;

            const a = (n * sumYT - sumY * sumT) / denom;
            const b = (sumT - a * sumY) / n;

            return { a, b, pointCount: n };
        }

        // Piksel y değerini sıcaklığa çevir
        function pixelYToTemp(y, calibration) {
            return calibration.a * y + calibration.b;
        }

        // Canvas üzerinde referans noktalarını göster
        function drawAllRefPoints() {
            const allRefs = [];
            for (const trace of currentTraceData) {
                if (trace.referencePoints) {
                    for (const rp of trace.referencePoints) {
                        allRefs.push(rp);
                    }
                }
            }

            for (const ref of allRefs) {
                // Küçük sarı daire
                ctx.beginPath();
                ctx.arc(ref.x, ref.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(251,191,36,0.7)';
                ctx.fill();
                ctx.strokeStyle = '#fbbf24';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Etiket
                const label = ref.temperature + '°C';
                ctx.font = 'bold 14px system-ui';
                ctx.fillStyle = '#fbbf24';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.strokeText(label, ref.x + 10, ref.y - 8);
                ctx.fillText(label, ref.x + 10, ref.y - 8);
            }
        }

        // ═══════════════════════════════════════
        // TAB GEÇİŞİ + VERİ YÜKLEME
        // ═══════════════════════════════════════

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('analysisTab').classList.toggle('active', tabName === 'analysis');
            document.getElementById('leaderboardTab').classList.toggle('active', tabName === 'leaderboard');
            if (tabName === 'leaderboard') buildLeaderboard();
        }

        function waitForFirebase() {
            return new Promise(resolve => {
                const check = () => (window.db && window.fireImports) ? resolve() : setTimeout(check, 100);
                check();
            });
        }

        async function init() {
            await waitForFirebase();
            const { collection, getDocs } = window.fireImports;
            const termSnap = await getDocs(collection(window.db, 'termograms'));
            allTermograms = termSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            const traceSnap = await getDocs(collection(window.db, 'traces'));
            allTraces = traceSnap.docs.map(d => ({ id: d.id, ...d.data() }));

            populateTermogramSelect(allTermograms);
        }
        init();

        function populateTermogramSelect(list) {
            const select = document.getElementById('termogramSelect');
            select.innerHTML = '<option value="">Kayıt seçin...</option>';
            const typeLabels = { termogram: '🌡️ Termogram', barograf: '📊 Barograf', termohigrograf: '💧 Termohigrograf', aktinograf: '☀️ Aktinograf' };
            const grouped = {};
            for (const t of list) {
                const dt = t.dataType || 'termogram';
                if (!grouped[dt]) grouped[dt] = [];
                grouped[dt].push(t);
            }
            for (const [dt, items] of Object.entries(grouped)) {
                const group = document.createElement('optgroup');
                group.label = typeLabels[dt] || dt;
                const sorted = [...items].sort((a, b) => b.traceCount - a.traceCount);
                for (const t of sorted) {
                    const opt = document.createElement('option');
                    opt.value = t.id;
                    const icon = t.traceCount >= t.maxTraces ? '✅' : `⏳ ${t.traceCount}/${t.maxTraces}`;
                    opt.textContent = `${icon}  ${t.label || t.id}`;
                    group.appendChild(opt);
                }
                select.appendChild(group);
            }
        }

        function filterTermogramSelect() {
            const selectedType = document.getElementById('dataTypeFilterAdmin').value;
            const filtered = selectedType ? allTermograms.filter(t => (t.dataType || 'termogram') === selectedType) : allTermograms;
            populateTermogramSelect(filtered);
        }

        // ═══════════════════════════════════════
        // TAB 1: TERMOGRAM ANALİZİ
        // ═══════════════════════════════════════

        async function onTermogramSelect() {
            const termId = document.getElementById('termogramSelect').value;
            if (!termId) return;
            const termogram = allTermograms.find(t => t.id === termId);
            if (!termogram) return;

            currentTermogramData = termogram;

            const badge = document.getElementById('statusBadge');
            const countText = document.getElementById('traceCountText');
            countText.textContent = `${termogram.traceCount}/${termogram.maxTraces} çizim`;
            if (termogram.traceCount >= termogram.maxTraces) badge.innerHTML = '<span class="badge badge-green">Tamamlandı</span>';
            else if (termogram.traceCount > 0) badge.innerHTML = '<span class="badge badge-yellow">Devam ediyor</span>';
            else badge.innerHTML = '<span class="badge badge-red">Henüz çizim yok</span>';

            const traces = allTraces.filter(t => t.termogramId === termId);
            if (traces.length === 0) {
                document.getElementById('analysisPanel').innerHTML = `<div class="waiting-message"><div class="icon">🕐</div><p>Henüz çizim yapılmamış.</p></div>`;
                document.getElementById('emptyState').style.display = 'flex';
                canvas.style.display = 'none';
                document.getElementById('legendContainer').style.display = 'none';
                currentAnalysisImage = null;
                currentAveragePoints = [];
                return;
            }
            await drawAnalysis(termogram, traces);
        }

        async function drawAnalysis(termogram, traces) {
            const img = await loadImage(termogram.imageFile);
            currentAnalysisImage = img;
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            document.getElementById('emptyState').style.display = 'none';
            canvas.style.display = 'block';
            canvas.classList.add('has-data');
            document.getElementById('legendContainer').style.display = 'flex';

            // Trace verilerini hazırla (referencePoints dahil)
            currentTraceData = traces.map(t => ({
                userName: t.userName || 'Anonim', userId: t.userId,
                pointCount: t.pointCount, rawPoints: t.rawPoints || [],
                calibratedData: t.calibratedData || [],
                referencePoints: t.referencePoints || []
            }));

            // Ortalama eğri + outlier tespiti + puanlar
            currentAveragePoints = [];
            currentScores = [];
            let outlierFlags = currentTraceData.map(() => false);

            if (currentTraceData.length >= 2) {
                // First pass: compute median with all traces
                let initialAvg = computeAverageCurve(currentTraceData.map(t => t.rawPoints));

                // Detect outliers based on z-score
                if (initialAvg.length > 0 && currentTraceData.length >= 3) {
                    outlierFlags = detectOutliers(currentTraceData.map(t => t.rawPoints), initialAvg);
                }

                // Recompute median excluding outliers
                const inlierPoints = currentTraceData.filter((_, i) => !outlierFlags[i]).map(t => t.rawPoints);
                if (inlierPoints.length >= 2) {
                    currentAveragePoints = computeAverageCurve(inlierPoints);
                } else {
                    currentAveragePoints = initialAvg;
                }

                currentScores = currentTraceData.map((trace, i) => {
                    const { mae, maxDev } = computeDeviation(trace.rawPoints, currentAveragePoints);
                    const maxAcceptable = canvas.height * 0.15;
                    const score = Math.max(0, Math.min(10, 10 * (1 - mae / maxAcceptable)));
                    return { userName: trace.userName, userId: trace.userId, pointCount: trace.pointCount, mae, maxDev, score: Math.round(score * 10) / 10, color: TRACE_COLORS[i % TRACE_COLORS.length], isOutlier: outlierFlags[i] };
                });
            }

            // Güven bandını çiz (trace'lerin arkasında)
            if (currentAveragePoints.length > 0 && currentTraceData.length >= 2) {
                const band = computeConfidenceBand(currentTraceData.map(t => t.rawPoints), currentAveragePoints, outlierFlags);
                drawConfidenceBand(band);
            }

            // Trace'leri çiz (outlier'lar kesikli çizgiyle)
            currentTraceData.forEach((trace, i) => {
                const color = TRACE_COLORS[i % TRACE_COLORS.length];
                if (outlierFlags[i]) {
                    ctx.save();
                    ctx.setLineDash([8, 6]);
                    drawCurve(trace.rawPoints, color, 2);
                    ctx.setLineDash([]);
                    ctx.restore();
                } else {
                    drawCurve(trace.rawPoints, color, 2);
                }
            });

            // Ortalama eğriyi çiz
            if (currentAveragePoints.length > 0) {
                drawCurve(currentAveragePoints, AVERAGE_COLOR, 3);
            }

            // Referans noktalarından kalibrasyon oluştur
            currentRefCalibration = buildRefCalibration(traces);

            // Referans noktalarını canvas'a çiz
            drawAllRefPoints();

            buildLegend(currentTraceData, currentAveragePoints.length > 0, currentRefCalibration, outlierFlags);
            buildAnalysisPanel(termogram, currentTraceData, currentScores, currentRefCalibration);
        }

        // ═══════════════════════════════════════
        // TAB 2: GENEL SIRALAMA
        // ═══════════════════════════════════════

        function buildLeaderboard() {
            const container = document.getElementById('leaderboardContent');
            const completedTermograms = allTermograms.filter(t => t.traceCount >= (t.maxTraces || 3));
            if (completedTermograms.length === 0) {
                container.innerHTML = `<div class="empty-state" style="padding:60px;"><div class="icon">⏳</div><p>Henüz hiçbir termogram yeterli çizime ulaşmadı.</p></div>`;
                return;
            }

            const userScores = {};
            for (const termogram of completedTermograms) {
                const traces = allTraces.filter(t => t.termogramId === termogram.id);
                if (traces.length < 2) continue;

                // Compute initial median curve with all traces
                const allRawPoints = traces.map(t => t.rawPoints || []);
                let averagePoints = computeAverageCurve(allRawPoints);
                if (averagePoints.length === 0) continue;

                // Step 1: Outlier detection — recompute average without statistical outliers
                if (traces.length >= 3) {
                    const outlierFlags = detectOutliers(allRawPoints, averagePoints);
                    const inlierPoints = allRawPoints.filter((_, i) => !outlierFlags[i]);
                    if (inlierPoints.length >= 2) {
                        const inlierAvg = computeAverageCurve(inlierPoints);
                        if (inlierAvg.length > 0) averagePoints = inlierAvg;
                    }
                }

                // Step 2: Trimmed mean — if 5+ traces, exclude best and worst by MAE
                if (traces.length >= 5) {
                    const traceMAEs = traces.map((trace, i) => ({
                        index: i,
                        mae: computeDeviation(trace.rawPoints || [], averagePoints).mae
                    }));
                    traceMAEs.sort((a, b) => a.mae - b.mae);
                    // Exclude lowest MAE (best) and highest MAE (worst)
                    const trimmedIndices = new Set(traceMAEs.slice(1, -1).map(t => t.index));
                    const trimmedRawPoints = allRawPoints.filter((_, i) => trimmedIndices.has(i));
                    const trimmedAvg = computeAverageCurve(trimmedRawPoints);
                    if (trimmedAvg.length > 0) averagePoints = trimmedAvg;
                }

                const estimatedHeight = (termogram.gridBottom - termogram.gridTop) || 950;
                const maxAcceptable = estimatedHeight * 0.15;
                traces.forEach(trace => {
                    const { mae } = computeDeviation(trace.rawPoints || [], averagePoints);
                    const score = Math.max(0, Math.min(10, 10 * (1 - mae / maxAcceptable)));
                    const userId = trace.userId;
                    if (!userScores[userId]) userScores[userId] = { userName: trace.userName || 'Anonim', scores: [] };
                    userScores[userId].scores.push({ termogramId: termogram.id, termogramLabel: termogram.label || termogram.id, score: Math.round(score * 10) / 10, mae: Math.round(mae * 10) / 10 });
                });
            }

            const sortedUsers = Object.entries(userScores).map(([userId, data]) => {
                const totalScore = Math.round(data.scores.reduce((s, x) => s + x.score, 0) * 10) / 10;
                const avgScore = Math.round((totalScore / data.scores.length) * 10) / 10;
                const totalMAE = Math.round(data.scores.reduce((s, x) => s + x.mae, 0) / data.scores.length * 10) / 10;
                return { userId, userName: data.userName, scores: data.scores, totalScore, avgScore, totalMAE };
            }).sort((a, b) => b.totalScore - a.totalScore);

            if (sortedUsers.length === 0) { container.innerHTML = `<div class="empty-state" style="padding:60px;"><div class="icon">📊</div><p>Henüz puanlanacak veri yok.</p></div>`; return; }

            let html = `<div class="leaderboard-header"><h2>🏆 Genel Sıralama</h2><div class="leaderboard-summary">
                <div class="stat-box"><div class="value">${completedTermograms.length}</div><div class="label">Tamamlanan Termogram</div></div>
                <div class="stat-box"><div class="value">${sortedUsers.length}</div><div class="label">Toplam Kullanıcı</div></div></div></div>`;
            html += `<table class="leaderboard-table"><thead><tr><th>Sıra</th><th>Kullanıcı</th><th style="text-align:right">Çizim</th><th style="text-align:right">Ort. Sapma</th><th style="text-align:right">Ort. Puan</th><th style="text-align:right">Toplam Puan</th></tr></thead><tbody>`;
            sortedUsers.forEach((user, i) => {
                const rank = i + 1;
                const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `${rank}.`;
                const sc = user.avgScore >= 8 ? '#22c55e' : user.avgScore >= 5 ? '#fbbf24' : '#ef4444';
                html += `<tr class="${rank <= 3 ? 'top-row' : ''}" style="cursor:pointer;" onclick="showUserDetail('${user.userId}')">
                    <td class="rank-cell">${medal}</td><td class="name-cell">${rank === 1 ? '👑 ' : ''}${user.userName}</td>
                    <td class="detail-cell">${user.scores.length}</td><td class="detail-cell">${user.totalMAE} px</td>
                    <td class="detail-cell" style="color:${sc};font-weight:600;">${user.avgScore}</td>
                    <td class="score-cell" style="color:${sc}">${user.totalScore}</td></tr>`;
            });
            html += `</tbody></table><div id="userDetailArea"></div>`;
            container.innerHTML = html;
            window._leaderboardUsers = sortedUsers;
        }

        function showUserDetail(userId) {
            const user = window._leaderboardUsers.find(u => u.userId === userId);
            if (!user) return;
            const area = document.getElementById('userDetailArea');
            const sorted = [...user.scores].sort((a, b) => b.score - a.score);
            let rows = sorted.map(s => {
                const sc = s.score >= 8 ? '#22c55e' : s.score >= 5 ? '#fbbf24' : '#ef4444';
                return `<tr><td>${s.termogramLabel}</td><td style="text-align:right;color:#94a3b8;">${s.mae} px</td><td style="text-align:right;color:${sc};font-weight:600;">${s.score}/10</td></tr>`;
            }).join('');
            area.innerHTML = `<div class="user-detail-card"><h3>📋 ${user.userName} — Puan Dökümü</h3>
                <table class="breakdown-table"><thead><tr><th>Termogram</th><th style="text-align:right">Sapma</th><th style="text-align:right">Puan</th></tr></thead>
                <tbody>${rows}</tbody><tfoot><tr style="border-top:2px solid #334155;"><td style="font-weight:600;">Toplam</td>
                <td style="text-align:right;color:#94a3b8;">${user.totalMAE} px ort.</td>
                <td style="text-align:right;font-weight:700;color:#93c5fd;font-size:1rem;">${user.totalScore}</td></tr></tfoot></table></div>`;
            area.scrollIntoView({ behavior: 'smooth' });
        }

        // ═══════════════════════════════════════
        // ÇİZİM + MATEMATİK
        // ═══════════════════════════════════════

        function loadImage(src) { return new Promise((res, rej) => { const img = new Image(); img.onload = () => res(img); img.onerror = rej; img.src = src; }); }

        function drawCurve(points, color, lineWidth) {
            if (points.length < 2) return;
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
        }

        function median(arr) {
            if (arr.length === 0) return null;
            const s = [...arr].sort((a, b) => a - b);
            const mid = Math.floor(s.length / 2);
            return s.length % 2 !== 0 ? s[mid] : (s[mid - 1] + s[mid]) / 2;
        }

        function computeAverageCurve(allRawPoints) {
            const sorted = allRawPoints.map(pts => [...pts].sort((a, b) => a.x - b.x));
            // Use UNION of all trace x-ranges (not intersection) so a single short trace
            // doesn't clip the average curve. Require at least half the traces to have
            // data at each x position before including that point.
            const allMinX = Math.min(...sorted.map(pts => pts[0]?.x ?? Infinity));
            const allMaxX = Math.max(...sorted.map(pts => pts[pts.length - 1]?.x ?? 0));
            if (allMaxX <= allMinX) return [];
            const minRequired = Math.max(1, Math.ceil(sorted.length / 2));
            const step = 5, avg = [];
            for (let x = allMinX; x <= allMaxX; x += step) {
                const yValues = [];
                for (const pts of sorted) { const y = interpolateY(pts, x); if (y !== null) yValues.push(y); }
                if (yValues.length >= minRequired) avg.push({ x, y: Math.round(median(yValues)) });
            }
            return avg;
        }

        function interpolateY(sortedPoints, targetX) {
            if (!sortedPoints.length) return null;
            if (targetX < sortedPoints[0].x || targetX > sortedPoints[sortedPoints.length - 1].x) return null;
            for (let i = 0; i < sortedPoints.length - 1; i++) {
                const p1 = sortedPoints[i], p2 = sortedPoints[i + 1];
                if (targetX >= p1.x && targetX <= p2.x) {
                    if (p2.x === p1.x) return p1.y;
                    return p1.y + ((targetX - p1.x) / (p2.x - p1.x)) * (p2.y - p1.y);
                }
            }
            return null;
        }

        function computeDeviation(rawPoints, averagePoints) {
            const sorted = [...rawPoints].sort((a, b) => a.x - b.x);
            let totalError = 0, maxDev = 0, count = 0;
            for (const avgPt of averagePoints) {
                const userY = interpolateY(sorted, avgPt.x);
                if (userY !== null) { const err = Math.abs(userY - avgPt.y); totalError += err; if (err > maxDev) maxDev = err; count++; }
            }
            return { mae: Math.round((count > 0 ? totalError / count : 0) * 10) / 10, maxDev: Math.round(maxDev * 10) / 10 };
        }

        function detectOutliers(allRawPoints, averagePoints) {
            // For each trace, compute average z-score against the median curve
            const sortedTraces = allRawPoints.map(pts => [...pts].sort((a, b) => a.x - b.x));
            // Compute stddev at each x position
            const step = 5;
            const xPositions = averagePoints.map(p => p.x);
            const traceZScores = sortedTraces.map(() => []);

            for (const avgPt of averagePoints) {
                const deviations = [];
                const traceYs = [];
                for (let t = 0; t < sortedTraces.length; t++) {
                    const y = interpolateY(sortedTraces[t], avgPt.x);
                    traceYs.push(y);
                    if (y !== null) deviations.push(Math.abs(y - avgPt.y));
                }
                const mean = deviations.length > 0 ? deviations.reduce((a, b) => a + b, 0) / deviations.length : 0;
                const stddev = deviations.length > 1 ? Math.sqrt(deviations.reduce((s, d) => s + (d - mean) ** 2, 0) / deviations.length) : 0;

                for (let t = 0; t < sortedTraces.length; t++) {
                    if (traceYs[t] !== null && stddev > 0) {
                        traceZScores[t].push(Math.abs(traceYs[t] - avgPt.y) / stddev);
                    }
                }
            }

            // A trace is an outlier if its average z-score > 2.5
            return traceZScores.map(zs => zs.length > 0 ? (zs.reduce((a, b) => a + b, 0) / zs.length) > 2.5 : false);
        }

        function computeConfidenceBand(allRawPoints, averagePoints, outlierFlags) {
            const inlierPoints = allRawPoints.filter((_, i) => !outlierFlags || !outlierFlags[i]);
            const sorted = inlierPoints.map(pts => [...pts].sort((a, b) => a.x - b.x));
            const threshold = canvas.height * 0.1;
            const band = [];

            for (const avgPt of averagePoints) {
                const yValues = [];
                for (const pts of sorted) {
                    const y = interpolateY(pts, avgPt.x);
                    if (y !== null) yValues.push(y);
                }
                if (yValues.length < 2) {
                    band.push({ x: avgPt.x, upper: avgPt.y, lower: avgPt.y, confidence: 1 });
                    continue;
                }
                yValues.sort((a, b) => a - b);
                const q1 = yValues[Math.floor(yValues.length * 0.25)];
                const q3 = yValues[Math.floor(yValues.length * 0.75)];
                const iqr = q3 - q1;
                const confidence = Math.max(0, 1 - iqr / threshold);
                band.push({ x: avgPt.x, upper: q1, lower: q3, confidence });
            }
            return band;
        }

        function drawConfidenceBand(band) {
            if (band.length < 2) return;
            // Draw filled band segments with varying opacity
            for (let i = 0; i < band.length - 1; i++) {
                const p1 = band[i], p2 = band[i + 1];
                const avgConf = (p1.confidence + p2.confidence) / 2;
                // High confidence = green, low confidence = red
                const r = Math.round(239 * (1 - avgConf) + 34 * avgConf);
                const g = Math.round(68 * (1 - avgConf) + 197 * avgConf);
                const b = Math.round(68 * (1 - avgConf) + 94 * avgConf);
                const alpha = 0.15 + avgConf * 0.2;

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.upper);
                ctx.lineTo(p2.x, p2.upper);
                ctx.lineTo(p2.x, p2.lower);
                ctx.lineTo(p1.x, p1.lower);
                ctx.closePath();
                ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
                ctx.fill();
            }
        }

        // ═══════════════════════════════════════
        // LEJANT + ANALİZ PANELİ
        // ═══════════════════════════════════════

        function buildLegend(traceData, hasAverage, refCal, outlierFlags) {
            const c = document.getElementById('legendContainer'); c.innerHTML = '';
            traceData.forEach((t, i) => {
                const isOutlier = outlierFlags && outlierFlags[i];
                const outlierBadge = isOutlier ? ' <span style="color:#ef4444;font-size:0.7rem;">⚠️ Outlier</span>' : '';
                const dashStyle = isOutlier ? 'border-top:2px dashed ${TRACE_COLORS[i % TRACE_COLORS.length]};background:none;height:0;' : `background:${TRACE_COLORS[i % TRACE_COLORS.length]}`;
                c.innerHTML += `<div class="legend-item"><div class="legend-color" style="${isOutlier ? `border-top:2px dashed ${TRACE_COLORS[i % TRACE_COLORS.length]};background:none;height:0;margin-top:6px;` : `background:${TRACE_COLORS[i % TRACE_COLORS.length]}`}"></div><span>${t.userName}${outlierBadge}</span></div>`;
            });
            if (hasAverage) c.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${AVERAGE_COLOR};height:5px;"></div><span style="font-weight:600;">Ortalama Eğri</span></div>`;
            if (refCal) c.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:#fbbf24;width:8px;height:8px;border-radius:50%;"></div><span>Referans Noktaları (${refCal.pointCount})</span></div>`;
            c.innerHTML += `<div class="legend-item" style="color:#94a3b8; font-style:italic;">💡 Mouse'u eğri üzerinde gezdirerek sıcaklık değerlerini görün</div>`;
        }

        function buildAnalysisPanel(termogram, traceData, scores, refCal) {
            const panel = document.getElementById('analysisPanel');
            const tc = traceData.length, mt = termogram.maxTraces || 3;

            if (tc < mt) {
                let uh = traceData.map((t, i) => `<div class="user-card"><div class="user-card-header">
                    <span class="user-name" style="color:${TRACE_COLORS[i]}">${t.userName}</span>
                    <span style="font-size:0.75rem;color:#64748b;">${t.pointCount} nokta</span></div>
                    <div class="user-stats"><div>Referans noktası: <span class="stat-value">${t.referencePoints.length}</span></div>
                    <div>Puan: <span class="stat-value" style="color:#fbbf24;">Bekleniyor...</span></div></div></div>`).join('');
                panel.innerHTML = `<h2>Çizimler (${tc}/${mt})</h2>${uh}
                    <div class="waiting-message" style="margin-top:16px;"><div class="icon">⏳</div>
                    <p>Puanlar ${mt}. çizim tamamlandığında hesaplanacak.</p></div>`;
                return;
            }

            const bestScore = Math.max(...scores.map(s => s.score));
            const outlierCount = scores.filter(s => s.isOutlier).length;
            const inlierScores = scores.filter(s => !s.isOutlier);
            const avgMAE = inlierScores.length > 0 ? inlierScores.reduce((s, x) => s + x.mae, 0) / inlierScores.length : 0;

            let statsHTML = `<div class="stats-grid">
                <div class="stat-box"><div class="value">${tc}</div><div class="label">Toplam Çizim</div></div>
                <div class="stat-box"><div class="value">${Math.round(avgMAE * 10) / 10}px</div><div class="label">Ort. Sapma</div></div>
                ${outlierCount > 0 ? `<div class="stat-box"><div class="value" style="color:#ef4444;">${outlierCount}</div><div class="label">Outlier</div></div>` : ''}
                </div>`;

            if (refCal) {
                statsHTML += `<div style="background:#1c1917;border:1px solid #fbbf24;border-radius:8px;padding:10px;margin-bottom:16px;font-size:0.78rem;color:#fde68a;">
                    📌 ${refCal.pointCount} referans noktasından kalibrasyon oluşturuldu. Mouse ile eğri üzerinde gezinerek sıcaklık değerlerini görebilirsiniz.</div>`;
            }

            const ss = [...scores].sort((a, b) => b.score - a.score);
            let uh = ss.map((s, rank) => {
                const isBest = s.score === bestScore && !s.isOutlier;
                const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : '🥉';
                const sc = s.isOutlier ? '#ef4444' : s.score >= 8 ? '#22c55e' : s.score >= 5 ? '#fbbf24' : '#ef4444';
                const refCount = traceData.find(t => t.userId === s.userId)?.referencePoints.length || 0;
                const outlierBadge = s.isOutlier ? '<span style="background:#ef4444;color:#fff;font-size:0.65rem;padding:2px 6px;border-radius:4px;margin-left:8px;">⚠️ Outlier</span>' : '';
                return `<div class="user-card ${isBest ? 'winner' : ''}" ${s.isOutlier ? 'style="opacity:0.7;border-left:3px solid #ef4444;"' : ''}><div class="user-card-header">
                    <span class="user-name">${isBest ? '<span class="crown">👑</span>' : ''}<span style="color:${s.color}">${medal} ${s.userName}</span>${outlierBadge}</span>
                    <div style="text-align:right;"><div class="user-score" style="color:${sc}">${s.score}</div><div class="score-label">/ 10</div></div></div>
                    <div class="user-stats"><div>Ort. Sapma: <span class="stat-value">${s.mae} px</span></div>
                    <div>Maks. Sapma: <span class="stat-value">${s.maxDev} px</span></div>
                    <div>Nokta: <span class="stat-value">${s.pointCount}</span> · Ref: <span class="stat-value">${refCount}</span></div>
                    ${s.isOutlier ? '<div style="color:#ef4444;font-size:0.75rem;margin-top:4px;">Ortalama hesabından çıkarıldı</div>' : ''}</div></div>`;
            }).join('');

            panel.innerHTML = `<h2>Çapraz Doğrulama Analizi</h2>${statsHTML}<h2 style="margin-top:8px;">Kullanıcı Puanları</h2>${uh}`;
        }
    </script>

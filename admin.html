    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getFirestore, collection, getDocs, query, where }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
        import { getAuth, signInAnonymously }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

        const app = initializeApp({
            apiKey: "AIzaSyAiIza_wzTlnL6mrtu6pBJwDVQBOjfLlr8",
            authDomain: "termogram-digitizer.firebaseapp.com",
            projectId: "termogram-digitizer",
            storageBucket: "termogram-digitizer.firebasestorage.app",
            messagingSenderId: "818774713299",
            appId: "1:818774713299:web:1dbe686cde9147adc94526"
        });

        const db = getFirestore(app);
        const auth = getAuth(app);
        await signInAnonymously(auth);

        window.db = db;
        window.fireImports = { collection, getDocs, query, where };
    </script>

<body>
    <div class="top-bar">
        <h1>📊 Admin Panel — Çapraz Doğrulama Analizi</h1>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="switchTab('analysis')">🔬 Termogram Analizi</div>
        <div class="tab" onclick="switchTab('leaderboard')">🏆 Genel Sıralama</div>
    </div>

    <!-- TAB 1: TERMOGRAM ANALİZİ -->
    <div id="analysisTab" class="analysis-section active">
        <div class="controls">
            <select id="termogramSelect" onchange="onTermogramSelect()">
                <option value="">Termogram seçin...</option>
            </select>
            <span id="statusBadge"></span>
            <span id="traceCountText" style="font-size:0.8rem; color:#94a3b8;"></span>
        </div>
        <div class="main-grid">
            <div class="canvas-section">
                <div id="emptyState" class="empty-state">
                    <div class="icon">🌡️</div>
                    <p>Bir termogram seçerek çapraz doğrulama analizini görüntüleyin</p>
                </div>
                <canvas id="analysisCanvas" style="display:none;"></canvas>
                <div id="legendContainer" class="legend" style="display:none;"></div>
            </div>
            <div class="side-panel">
                <div id="analysisPanel">
                    <div class="empty-state" style="height:auto; padding:60px 20px;">
                        <div class="icon">📈</div>
                        <p>Analiz sonuçları burada görünecek</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TAB 2: GENEL SIRALAMA -->
    <div id="leaderboardTab" class="leaderboard-section">
        <div id="leaderboardContent">
            <div class="empty-state" style="padding:60px;">
                <div class="icon">⏳</div>
                <p>Yükleniyor...</p>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('analysisCanvas');
        const ctx = canvas.getContext('2d');
        let allTermograms = [];
        let allTraces = [];
        const TRACE_COLORS = ['#f97316', '#22d3ee', '#a78bfa'];
        const AVERAGE_COLOR = '#22c55e';

        // ── Tab geçişi ──
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('analysisTab').classList.toggle('active', tabName === 'analysis');
            document.getElementById('leaderboardTab').classList.toggle('active', tabName === 'leaderboard');
            if (tabName === 'leaderboard') buildLeaderboard();
        }

        // ── Firebase bekle ve veri çek ──
        function waitForFirebase() {
            return new Promise(resolve => {
                const check = () => (window.db && window.fireImports) ? resolve() : setTimeout(check, 100);
                check();
            });
        }

        async function init() {
            await waitForFirebase();
            const { collection, getDocs } = window.fireImports;
            const termSnap = await getDocs(collection(window.db, 'termograms'));
            allTermograms = termSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            const traceSnap = await getDocs(collection(window.db, 'traces'));
            allTraces = traceSnap.docs.map(d => ({ id: d.id, ...d.data() }));

            const select = document.getElementById('termogramSelect');
            const sorted = [...allTermograms].sort((a, b) => b.traceCount - a.traceCount);
            for (const t of sorted) {
                const opt = document.createElement('option');
                opt.value = t.id;
                const icon = t.traceCount >= t.maxTraces ? '✅' : `⏳ ${t.traceCount}/${t.maxTraces}`;
                opt.textContent = `${icon}  ${t.label || t.id}`;
                select.appendChild(opt);
            }
        }
        init();

        // ═══════════════════════════════════════
        // TAB 1: TERMOGRAM ANALİZİ
        // ═══════════════════════════════════════

        async function onTermogramSelect() {
            const termId = document.getElementById('termogramSelect').value;
            if (!termId) return;
            const termogram = allTermograms.find(t => t.id === termId);
            if (!termogram) return;

            const badge = document.getElementById('statusBadge');
            const countText = document.getElementById('traceCountText');
            countText.textContent = `${termogram.traceCount}/${termogram.maxTraces} çizim`;
            if (termogram.traceCount >= termogram.maxTraces) {
                badge.innerHTML = '<span class="badge badge-green">Tamamlandı</span>';
            } else if (termogram.traceCount > 0) {
                badge.innerHTML = '<span class="badge badge-yellow">Devam ediyor</span>';
            } else {
                badge.innerHTML = '<span class="badge badge-red">Henüz çizim yok</span>';
            }

            const traces = allTraces.filter(t => t.termogramId === termId);
            if (traces.length === 0) {
                document.getElementById('analysisPanel').innerHTML = `
                    <div class="waiting-message"><div class="icon">🕐</div>
                    <p>Bu termogram için henüz çizim yapılmamış.</p></div>`;
                document.getElementById('emptyState').style.display = 'flex';
                canvas.style.display = 'none';
                document.getElementById('legendContainer').style.display = 'none';
                return;
            }
            await drawAnalysis(termogram, traces);
        }

        async function drawAnalysis(termogram, traces) {
            const img = await loadImage(termogram.imageFile);
            canvas.width = img.width; canvas.height = img.height;
            ctx.drawImage(img, 0, 0);
            document.getElementById('emptyState').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('legendContainer').style.display = 'flex';

            const traceData = traces.map(t => ({
                userName: t.userName || 'Anonim', userId: t.userId,
                pointCount: t.pointCount, rawPoints: t.rawPoints || [],
                calibratedData: t.calibratedData || []
            }));

            traceData.forEach((trace, i) => drawCurve(trace.rawPoints, TRACE_COLORS[i % TRACE_COLORS.length], 2));

            let averagePoints = [], scores = [];
            if (traceData.length >= 2) {
                averagePoints = computeAverageCurve(traceData.map(t => t.rawPoints));
                drawCurve(averagePoints, AVERAGE_COLOR, 3);
                scores = traceData.map((trace, i) => {
                    const { mae, maxDev } = computeDeviation(trace.rawPoints, averagePoints);
                    const maxAcceptable = canvas.height * 0.15;
                    const score = Math.max(0, Math.min(10, 10 * (1 - mae / maxAcceptable)));
                    return {
                        userName: trace.userName, userId: trace.userId, pointCount: trace.pointCount,
                        mae, maxDev, score: Math.round(score * 10) / 10, color: TRACE_COLORS[i % TRACE_COLORS.length]
                    };
                });
            }
            buildLegend(traceData, averagePoints.length > 0);
            buildAnalysisPanel(termogram, traceData, scores);
        }

        // ═══════════════════════════════════════
        // TAB 2: GENEL SIRALAMA
        // ═══════════════════════════════════════

        function buildLeaderboard() {
            const container = document.getElementById('leaderboardContent');
            const completedTermograms = allTermograms.filter(t => t.traceCount >= (t.maxTraces || 3));

            if (completedTermograms.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding:60px;">
                        <div class="icon">⏳</div>
                        <p>Henüz hiçbir termogram 3 çizime ulaşmadı.</p>
                        <p style="font-size:0.8rem; color:#64748b; margin-top:8px;">
                            Puanlar ancak bir termogram 3 farklı kişi tarafından çizildiğinde hesaplanır.</p>
                    </div>`;
                return;
            }

            // Her kullanıcının her termogramdaki puanını hesapla
            const userScores = {};
            for (const termogram of completedTermograms) {
                const traces = allTraces.filter(t => t.termogramId === termogram.id);
                if (traces.length < 2) continue;
                const averagePoints = computeAverageCurve(traces.map(t => t.rawPoints || []));
                if (averagePoints.length === 0) continue;
                const estimatedHeight = (termogram.gridBottom - termogram.gridTop) || 950;
                const maxAcceptable = estimatedHeight * 0.15;

                traces.forEach(trace => {
                    const { mae } = computeDeviation(trace.rawPoints || [], averagePoints);
                    const score = Math.max(0, Math.min(10, 10 * (1 - mae / maxAcceptable)));
                    const roundedScore = Math.round(score * 10) / 10;
                    const userId = trace.userId;
                    if (!userScores[userId]) {
                        userScores[userId] = { userName: trace.userName || 'Anonim', scores: [] };
                    }
                    userScores[userId].scores.push({
                        termogramId: termogram.id, termogramLabel: termogram.label || termogram.id,
                        score: roundedScore, mae: Math.round(mae * 10) / 10
                    });
                });
            }

            // Toplamları hesapla ve sırala
            const sortedUsers = Object.entries(userScores).map(([userId, data]) => {
                const totalScore = Math.round(data.scores.reduce((s, x) => s + x.score, 0) * 10) / 10;
                const avgScore = Math.round((totalScore / data.scores.length) * 10) / 10;
                const totalMAE = Math.round(data.scores.reduce((s, x) => s + x.mae, 0) / data.scores.length * 10) / 10;
                return { userId, userName: data.userName, scores: data.scores, totalScore, avgScore, totalMAE };
            }).sort((a, b) => b.totalScore - a.totalScore);

            if (sortedUsers.length === 0) {
                container.innerHTML = `<div class="empty-state" style="padding:60px;"><div class="icon">📊</div><p>Henüz puanlanacak veri yok.</p></div>`;
                return;
            }

            // Özet
            let html = `
                <div class="leaderboard-header">
                    <h2>🏆 Genel Sıralama — Tüm Kullanıcılar</h2>
                    <div class="leaderboard-summary">
                        <div class="stat-box"><div class="value">${completedTermograms.length}</div><div class="label">Tamamlanan Termogram</div></div>
                        <div class="stat-box"><div class="value">${sortedUsers.length}</div><div class="label">Toplam Kullanıcı</div></div>
                    </div>
                </div>`;

            // Tablo
            html += `<table class="leaderboard-table"><thead><tr>
                <th>Sıra</th><th>Kullanıcı</th><th style="text-align:right">Çizim Sayısı</th>
                <th style="text-align:right">Ort. Sapma</th><th style="text-align:right">Ort. Puan</th>
                <th style="text-align:right">Toplam Puan</th></tr></thead><tbody>`;

            sortedUsers.forEach((user, i) => {
                const rank = i + 1;
                const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `${rank}.`;
                const sc = user.avgScore >= 8 ? '#22c55e' : user.avgScore >= 5 ? '#fbbf24' : '#ef4444';
                html += `<tr class="${rank <= 3 ? 'top-row' : ''}" style="cursor:pointer;" onclick="showUserDetail('${user.userId}')">
                    <td class="rank-cell">${medal}</td>
                    <td class="name-cell">${rank === 1 ? '👑 ' : ''}${user.userName}</td>
                    <td class="detail-cell">${user.scores.length} termogram</td>
                    <td class="detail-cell">${user.totalMAE} px</td>
                    <td class="detail-cell" style="color:${sc}; font-weight:600;">${user.avgScore}</td>
                    <td class="score-cell" style="color:${sc}">${user.totalScore}</td></tr>`;
            });
            html += `</tbody></table><div id="userDetailArea"></div>`;
            container.innerHTML = html;
            window._leaderboardUsers = sortedUsers;
        }

        // Kullanıcıya tıklayınca termogram bazlı döküm göster
        function showUserDetail(userId) {
            const user = window._leaderboardUsers.find(u => u.userId === userId);
            if (!user) return;
            const area = document.getElementById('userDetailArea');
            const sorted = [...user.scores].sort((a, b) => b.score - a.score);
            let rows = sorted.map(s => {
                const sc = s.score >= 8 ? '#22c55e' : s.score >= 5 ? '#fbbf24' : '#ef4444';
                return `<tr><td>${s.termogramLabel}</td><td style="text-align:right;color:#94a3b8;">${s.mae} px</td>
                    <td style="text-align:right;color:${sc};font-weight:600;">${s.score} / 10</td></tr>`;
            }).join('');

            area.innerHTML = `
                <div class="user-detail-card">
                    <h3>📋 ${user.userName} — Termogram Bazlı Puan Dökümü</h3>
                    <table class="breakdown-table">
                        <thead><tr><th>Termogram</th><th style="text-align:right">Sapma (MAE)</th><th style="text-align:right">Puan</th></tr></thead>
                        <tbody>${rows}</tbody>
                        <tfoot><tr style="border-top:2px solid #334155;">
                            <td style="font-weight:600;">Toplam</td>
                            <td style="text-align:right;color:#94a3b8;">${user.totalMAE} px ort.</td>
                            <td style="text-align:right;font-weight:700;color:#93c5fd;font-size:1rem;">${user.totalScore}</td>
                        </tr></tfoot>
                    </table>
                </div>`;
            area.scrollIntoView({ behavior: 'smooth' });
        }

        // ═══════════════════════════════════════
        // ÇİZİM + MATEMATİK FONKSİYONLARI
        // ═══════════════════════════════════════

        function loadImage(src) {
            return new Promise((resolve, reject) => {
                const img = new Image(); img.onload = () => resolve(img); img.onerror = reject; img.src = src;
            });
        }

        function drawCurve(points, color, lineWidth) {
            if (points.length < 2) return;
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.strokeStyle = color; ctx.lineWidth = lineWidth; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
        }

        function computeAverageCurve(allRawPoints) {
            const sorted = allRawPoints.map(pts => [...pts].sort((a, b) => a.x - b.x));
            const allMinX = Math.max(...sorted.map(pts => pts[0]?.x ?? 0));
            const allMaxX = Math.min(...sorted.map(pts => pts[pts.length - 1]?.x ?? 0));
            if (allMaxX <= allMinX) return [];
            const step = 5, averagePoints = [];
            for (let x = allMinX; x <= allMaxX; x += step) {
                let ySum = 0, count = 0;
                for (const pts of sorted) { const y = interpolateY(pts, x); if (y !== null) { ySum += y; count++; } }
                if (count > 0) averagePoints.push({ x, y: Math.round(ySum / count) });
            }
            return averagePoints;
        }

        function interpolateY(sortedPoints, targetX) {
            if (!sortedPoints.length) return null;
            if (targetX < sortedPoints[0].x || targetX > sortedPoints[sortedPoints.length - 1].x) return null;
            for (let i = 0; i < sortedPoints.length - 1; i++) {
                const p1 = sortedPoints[i], p2 = sortedPoints[i + 1];
                if (targetX >= p1.x && targetX <= p2.x) {
                    if (p2.x === p1.x) return p1.y;
                    return p1.y + ((targetX - p1.x) / (p2.x - p1.x)) * (p2.y - p1.y);
                }
            }
            return null;
        }

        function computeDeviation(rawPoints, averagePoints) {
            const sorted = [...rawPoints].sort((a, b) => a.x - b.x);
            let totalError = 0, maxDev = 0, count = 0;
            for (const avgPt of averagePoints) {
                const userY = interpolateY(sorted, avgPt.x);
                if (userY !== null) {
                    const err = Math.abs(userY - avgPt.y);
                    totalError += err; if (err > maxDev) maxDev = err; count++;
                }
            }
            const mae = count > 0 ? totalError / count : 0;
            return { mae: Math.round(mae * 10) / 10, maxDev: Math.round(maxDev * 10) / 10 };
        }

        // ═══════════════════════════════════════
        // LEJANT + ANALİZ PANELİ
        // ═══════════════════════════════════════

        function buildLegend(traceData, hasAverage) {
            const c = document.getElementById('legendContainer'); c.innerHTML = '';
            traceData.forEach((t, i) => {
                c.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${TRACE_COLORS[i % TRACE_COLORS.length]}"></div><span>${t.userName}</span></div>`;
            });
            if (hasAverage) c.innerHTML += `<div class="legend-item"><div class="legend-color" style="background:${AVERAGE_COLOR};height:5px;"></div><span style="font-weight:600;">Ortalama Eğri</span></div>`;
        }

        function buildAnalysisPanel(termogram, traceData, scores) {
            const panel = document.getElementById('analysisPanel');
            const tc = traceData.length, mt = termogram.maxTraces || 3;

            if (tc < mt) {
                let uh = traceData.map((t, i) => `<div class="user-card"><div class="user-card-header">
                    <span class="user-name" style="color:${TRACE_COLORS[i]}">${t.userName}</span>
                    <span style="font-size:0.75rem;color:#64748b;">${t.pointCount} nokta</span></div>
                    <div class="user-stats"><div>Puan: <span class="stat-value" style="color:#fbbf24;">Bekleniyor...</span></div></div></div>`).join('');
                panel.innerHTML = `<h2>Çizimler (${tc}/${mt})</h2>${uh}
                    <div class="waiting-message" style="margin-top:16px;"><div class="icon">⏳</div>
                    <p>Puanlar ${mt}. çizim tamamlandığında hesaplanacak.</p>
                    <p style="font-size:0.75rem;margin-top:8px;">Eksik: ${mt - tc} çizim daha</p></div>`;
                return;
            }

            const bestScore = Math.max(...scores.map(s => s.score));
            const avgMAE = scores.reduce((s, x) => s + x.mae, 0) / scores.length;
            let statsHTML = `<div class="stats-grid">
                <div class="stat-box"><div class="value">${tc}</div><div class="label">Toplam Çizim</div></div>
                <div class="stat-box"><div class="value">${Math.round(avgMAE * 10) / 10}px</div><div class="label">Ort. Sapma (MAE)</div></div></div>`;

            const ss = [...scores].sort((a, b) => b.score - a.score);
            let uh = ss.map((s, rank) => {
                const isBest = s.score === bestScore;
                const medal = rank === 0 ? '🥇' : rank === 1 ? '🥈' : '🥉';
                const sc = s.score >= 8 ? '#22c55e' : s.score >= 5 ? '#fbbf24' : '#ef4444';
                return `<div class="user-card ${isBest ? 'winner' : ''}"><div class="user-card-header">
                    <span class="user-name">${isBest ? '<span class="crown">👑</span>' : ''}<span style="color:${s.color}">${medal} ${s.userName}</span></span>
                    <div style="text-align:right;"><div class="user-score" style="color:${sc}">${s.score}</div><div class="score-label">/ 10</div></div></div>
                    <div class="user-stats"><div>Ort. Sapma (MAE): <span class="stat-value">${s.mae} px</span></div>
                    <div>Maks. Sapma: <span class="stat-value">${s.maxDev} px</span></div>
                    <div>Nokta Sayısı: <span class="stat-value">${s.pointCount}</span></div></div></div>`;
            }).join('');

            panel.innerHTML = `<h2>Çapraz Doğrulama Analizi</h2>${statsHTML}<h2 style="margin-top:8px;">Kullanıcı Puanları</h2>${uh}`;
        }
    </script>
